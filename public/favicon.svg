<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0a0a"/>
  <!-- Monkey face -->
  <!-- Ears -->
  <ellipse cx="12" cy="34" rx="7" ry="8" fill="#8B5E3C"/>
  <ellipse cx="52" cy="34" rx="7" ry="8" fill="#8B5E3C"/>
  <ellipse cx="12" cy="34" rx="4" ry="5" fill="#C4845A"/>
  <ellipse cx="52" cy="34" rx="4" ry="5" fill="#C4845A"/>
  <!-- Head -->
  <ellipse cx="32" cy="30" rx="18" ry="17" fill="#8B5E3C"/>
  <!-- Face lighter area -->
  <ellipse cx="32" cy="36" rx="12" ry="10" fill="#C4845A"/>
  <!-- Eyes -->
  <ellipse cx="25" cy="26" rx="4" ry="4.5" fill="white"/>
  <ellipse cx="39" cy="26" rx="4" ry="4.5" fill="white"/>
  <circle cx="26" cy="27" r="2.5" fill="#1a1a1a"/>
  <circle cx="40" cy="27" r="2.5" fill="#1a1a1a"/>
  <circle cx="26.8" cy="26.2" r="0.8" fill="white"/>
  <circle cx="40.8" cy="26.2" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="33" rx="4" ry="2.5" fill="#6B3F1E"/>
  <circle cx="30.5" cy="32.5" r="1" fill="#4a2910"/>
  <circle cx="33.5" cy="32.5" r="1" fill="#4a2910"/>
  <!-- Mouth / smile -->
  <path d="M 27 37 Q 32 42 37 37" stroke="#6B3F1E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Code brackets on forehead -->
  <text x="28" y="22" font-family="monospace" font-size="7" fill="#22d3ee" font-weight="bold">&lt;/&gt;</text>
</svg>
